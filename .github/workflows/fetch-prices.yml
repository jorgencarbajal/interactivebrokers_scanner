name: Fetch Daily Prices

on:
  schedule:
    # 09:00 UTC daily = ~2am PT summer / ~1am PT winter, ~5am ET summer / ~4am ET winter
    # Adjust to match your local 2am; GH cron does not observe DST.
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run fetch_prices.py
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: uv run python -m scanner.data.prices.fetch_prices --force

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scanner/data/prices/raw
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh daily price bars"
            git push
          fi